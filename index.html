<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記号タイピングゲーム（名称付き）</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1>記号タイピングゲーム</h1>
        <p id="message">下の入力欄をクリックして、表示された記号を入力してください。<br>（括弧はセット・全28問）</p>
        
        <!-- 記号の名称を表示するエリア -->
        <div id="symbol-name"></div>
        <div id="target">準備完了</div>
        
        <input type="text" id="input-box" disabled autocomplete="off" inputmode="email" autocapitalize="none" autocorrect="off" spellcheck="false">
        <br><br>
        <button id="start-btn">スタート</button>
        <div id="timer">0.0 秒</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
